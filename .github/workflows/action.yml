 name: CI
 
 on:
   push:
     branches: [ main, master, develop ]
   pull_request:
     branches: [ main, master, develop ]
   workflow_dispatch: {}
 
 concurrency:
   group: ci-${{ github.ref }}
   cancel-in-progress: true
 
 jobs:
   backend:
     name: Backend — Python
     runs-on: ubuntu-latest
     strategy:
       matrix:
         python-version: [3.10, 3.11]
     steps:
       - name: Checkout repository
         uses: actions/checkout@v4
 
       - name: Set up Python
         uses: actions/setup-python@v4
         with:
           python-version: ${{ matrix.python-version }}
 
       - name: Cache pip
         uses: actions/cache@v4
         with:
           path: ~/.cache/pip
           key: pip-cache-${{ matrix.python-version }}-${{ hashFiles('**/backend/requirements*.txt') }}
           restore-keys: |
             pip-cache-${{ matrix.python-version }}-
 
       - name: Install backend dependencies
         working-directory: backend
         run: |
           python -m pip install --upgrade pip setuptools wheel
           if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
 
       - name: Run Django migrations
         working-directory: backend
         run: |
           python manage.py migrate --noinput
 
       - name: Run backend tests
         working-directory: backend
         env:
           PYTHONUNBUFFERED: 1
         run: |
           python manage.py test --verbosity=2
 
       - name: Upload backend logs (on failure)
         if: failure()
         uses: actions/upload-artifact@v4
         with:
           name: backend-logs-${{ github.run_id }}
           path: backend
 
   backend-lint:
     name: Backend — Lint & Formatting
     runs-on: ubuntu-latest
     needs: backend
     steps:
       - uses: actions/checkout@v4
 
       - name: Set up Python
         uses: actions/setup-python@v4
         with:
           python-version: 3.11
 
       - name: Install linting tools
         working-directory: backend
         run: |
           python -m pip install --upgrade pip
           pip install flake8 black isort
 
       - name: Run flake8
         working-directory: backend
         run: flake8 .
 
       - name: Check formatting with black
         working-directory: backend
         run: black --check .
 
   frontend:
     name: Frontend — Node
     runs-on: ubuntu-latest
     strategy:
       matrix:
         node-version: [18]
     steps:
       - name: Checkout repository
         uses: actions/checkout@v4
 
       - name: Use Node.js
         uses: actions/setup-node@v4
         with:
           node-version: ${{ matrix.node-version }}
           cache: 'npm'
 
       - name: Install frontend dependencies
         working-directory: pneumonia_frontend
         run: npm ci
 
       - name: Run frontend lint
         working-directory: pneumonia_frontend
         run: |
           if npm run -s lint; then echo "lint passed"; fi
 
       - name: Run frontend tests
         working-directory: pneumonia_frontend
         run: |
           if npm test --silent -- --watchAll=false; then echo "tests passed"; fi
 
       - name: Build frontend
         working-directory: pneumonia_frontend
         run: npm run build
 
       - name: Upload frontend build artifact
         uses: actions/upload-artifact@v4
         with:
           name: frontend-build
           path: pneumonia_frontend/dist
 
   deps-cache:
     name: Cache project artifacts
     runs-on: ubuntu-latest
     outputs:
       cache-hit: ${{ steps.cache.outputs.cache-hit }}
     steps:
       - name: Checkout
         uses: actions/checkout@v4
 
       - name: Warm caches (pip/npm)
         id: cache
         uses: actions/cache@v4
         with:
           path: |
             ~/.cache/pip
             ~/.npm
             ~/.cache/yarn
           key: project-cache-${{ runner.os }}-${{ hashFiles('**/backend/requirements*.txt','pneumonia_frontend/package-lock.json','pneumonia_frontend/package.json') }}
           restore-keys: project-cache-

